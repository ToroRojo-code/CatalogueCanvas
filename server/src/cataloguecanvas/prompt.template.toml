# Prompt template for LLM-based item descriptions.
#
# Placeholders {item_type}, {summary_focus}, {bullet_count}, {bullet_max_words}
# are substituted before the prompt is sent.

[output_schema]
descriptions = "array of exactly {bullet_count} bullet points, each under {bullet_max_words} words"
summary = "a couple of sentences covering {summary_focus}"

[instructions]
task = "Analyze the provided {item_type} and describe it matching the output_schema above."
constraints = [
    "Provide exactly {bullet_count} bullet points, each under {bullet_max_words} words.",
    "The summary must be a couple of sentences covering {summary_focus}.",
    "Respond with ONLY a single JSON object with 'descriptions' (array of strings) and 'summary' (string) keys.",
    "Do NOT include any reasoning, planning, preamble, explanation, or markdown code fences. Output the raw JSON object and nothing else.",
]
